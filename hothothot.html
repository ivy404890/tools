<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閲覧用 ccfolia log getter</title>
    <style>
        .sample-img {
            cursor: pointer;
            width: 40px;
        }

        .sample-img {
            height: auto;
            transition: transform .6s ease;
            /* ゆっくり変化させる */
        }

        @media (max-width: 768px) {
            .sample-img {
                width: 10vw;
                /* 画面幅基準 */
                max-width: 60px;
                /* 上限 */
                height: auto;
            }
        }

        .sample-img:hover {
            transform: matrix(7.5, 0, 0, 7.5, 150, 150);
        }

        #bg-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background-size: contain;
            background-repeat: no-repeat;
            background-position: right;

            opacity: 0.2;
            /* ←うっすら */
            pointer-events: none;
            /* 操作を邪魔しない */

            z-index: -1;
            /* 背面に */
            transition: background-image 0.5s ease;

        }

        header {
            position: fixed;
            background: #ffffff;
            width: 100%;
            box-sizing: border-box;
            padding: 5px;
        }

        @media (max-width: 768px) {
            header {
                position: relative;
                top: 0;
                left: 0;
                z-index: 10;
            }

            /* 入力欄をスマホで縦並びに */
            header input[type="text"],
            header input[type="button"] {
                width: 100%;
                margin: 3px 0;
                font-size: 14px;
            }
        }

        /* スマホ */
        #html {
            padding-top: 10px;
        }

        /* PC */
        @media (min-width: 768px) {
            #html {
                padding-top: 60px;
            }
        }

        @media (max-width: 768px) {
            body {
                font-size: 13px;
            }

            .sample-img {
                width: 12vw;
            }
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        var request = new XMLHttpRequest();
        var name_request = new XMLHttpRequest();
        var message_json = [];
        var tab_list = {};
        var current_room_id = "";
        const RET = '\n';
        const CRLF = '\r\n';

        function htmlspecialchars(str) {
            return (str + '').replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;'); //"
        }

        function removespecialchars(str) {
            return (str + '').replace(/&/g, 'removeamp')
                .replace(/"/g, 'removequot')
                .replace(/'/g, 'remove039')
                .replace(/</g, 'removelt')
                .replace(/>/g, 'removegt')
                .replace(/ /g, 'removespace')
                .replace(/\//g, 'removeslash'); //"
        }

        function get_property(obj, properties) {
            for (const p of properties) {
                if (p in obj) {
                    obj = obj[p];
                } else {
                    return null;
                }
            }
            return obj;
        }

        function get_url(room_id, token = "", size = 300) {
            const base_url = 'https://firestore.googleapis.com/v1/projects/ccfolia-160aa/databases/(default)/documents/rooms/';
            return base_url + room_id + '/messages/' + '?pageSize=' + size + '&pageToken=' + token;
        }

        function get_name_url(room_id) {
            const base_url = 'https://firestore.googleapis.com/v1/projects/ccfolia-160aa/databases/(default)/documents/rooms/';
            return base_url + room_id;
        }

        function get_current_tab() {
            return $('[name="html_selector"]:radio:checked').val();
        }

        function get_tab_dom_id(tab_id) {
            return '#__tab__' + tab_id;
        }

        function process_messages(json) {
            json.sort(function (a, b) {
                if (a.createTime < b.createTime) return -1;
                if (a.createTime > b.createTime) return 1;
                return 0;
            });
            console.log(Number($('#text_count').val()))
            var sjson = json.slice(-Number($('#text_count').val()));
            var id_length = Number($('#id_len').val());
            tab_list = {};
            var tab_doms = {};
            var all_dom = $("<div></div>", {
                id: '__tab__all'
            });;
            $('#html').text("");
            $('#html_selector').text("");

            tab_list['all'] = '全件';
            tab_doms['all'] = $("<div></div>", {
                id: '__tab__' + 'all'
            });
            $('#html_selector')
                .append($("<input>", {
                    type: 'radio',
                    name: 'html_selector',
                    value: 'all',
                    checked: true
                }))
                .append($("<label>", {
                    for: 'all'
                }).text('全件'));

            sjson.forEach(function (e) {
                const tab_id = removespecialchars(e.fields.channel.stringValue);
                const tab_name = e.fields.channelName.stringValue;
                if (!(tab_id in tab_list)) {
                    tab_list[tab_id] = tab_name;
                    tab_doms[tab_id] = $("<div></div>", {
                        id: '__tab__' + tab_id
                    });
                    $('#html_selector')
                        .append($("<input>", {
                            type: 'radio',
                            name: 'html_selector',
                            value: tab_id,
                            checked: false
                        }))
                        .append($("<label>", {
                            for: tab_id
                        }).text(tab_name));
                }

                if (e.fields.text.stringValue != null) {
                    // Dice Roll
                    var roll = get_property(
                        e.fields, ["extend", "mapValue", "fields", "roll", "mapValue", "fields", "result", "stringValue"]
                    );
                    if (!roll) {
                        roll = "";
                    }
                    roll.replace(/\r?\n/, '');
                    var text = htmlspecialchars(e.fields.text.stringValue).split(/\r?\n/);
                    text = text.join('<br>' + RET + '    ') + roll;
                    if (text.length > 10000) {
                        text = "メチャクチャ長いので省略されました";
                    }
                    string = RET;
                    const timestamp = new Date(e.fields.createdAt.timestampValue);
                    if (tab_name == "other" || tab_name.includes("雑談")) {
                        string += '<p style="color:' + "#888888" + ';">' + timestamp.toLocaleString("ja") + '<br>';
                    } else {
                        string += '<p>' + timestamp.toLocaleString("ja") + '<br>';
                    }
                    string += e.fields.from.stringValue.substring(0, id_length) + RET;
                    string += '  <span> [' + tab_name + ']</span>' + RET;
                    if (e.fields.iconUrl.stringValue)
                        string += '<img src="' + e.fields.iconUrl.stringValue + '" alt="消" class="sample-img">';
                    string += '  <span style="color:' + e.fields.color.stringValue + ';">' + htmlspecialchars(e.fields.name.stringValue) + '</span> :' + RET;
                    if (tab_name == "other" || tab_name.includes("雑談")) {
                        string += '  <span style="color:#888888">' + RET;
                    } else {
                        string += '  <span style="color:#000000">' + RET;
                    }
                    string += '    ' + text + RET;
                    string += '  </span>' + RET;
                    string += '</p>' + RET;
                    $(tab_doms['all']).append(string);

                    string = RET + '<p>' + timestamp.toLocaleString("ja") + '<br>' + RET;
                    string += e.fields.from.stringValue.substring(0, id_length) + '  <span style="color:' + e.fields.color.stringValue + ';">' + htmlspecialchars(e.fields.name.stringValue) + '</span> :' + RET;
                    if (e.fields.iconUrl.stringValue)
                        string += '<img src="' + e.fields.iconUrl.stringValue + '" alt="消" class="sample-img">';
                    string += '  <span style="color:#000000">' + RET;
                    string += '    ' + text + RET;
                    string += '  </span>' + RET;
                    string += '</p>' + RET;
                    $(tab_doms[tab_id]).append(string);
                }
            });
            for (const tab_id in tab_doms) {
                $('#html').append(tab_doms[tab_id]);
                if (tab_id != 'all') {
                    $('#__tab__' + tab_id).hide();
                }
            }
            $('[name="html_selector"]:radio').change(function () {
                const show_tab_id = get_current_tab();
                for (const tab_id in tab_list) {
                    if (tab_id == show_tab_id) {
                        $(get_tab_dom_id(tab_id)).show();
                    } else {
                        $(get_tab_dom_id(tab_id)).hide();
                    }
                }
            });
            $('#progress').text("完了");
        }

        function convertToHTML(elem) {
            return jQuery('<div>').append(elem.clone(true)).html();
        }

        function http_request_callback() {
            console.log(this);
            const data = this.response;
            for (const d of data.documents) {
                message_json.push(d);
            }

            $('#log_number').text(message_json.length + "件");
            if (data.nextPageToken) {
                this.open('GET', get_url(current_room_id, data.nextPageToken), true);
                this.responseType = 'json';
                this.send();
            } else {
                $('#progress').text("HTML生成中...");
                setTimeout(() => {
                    process_messages(message_json);
                }, 1);
                this.removeEventListener("load", http_request_callback);
            }
        }

        function http_request_callback_name() {
            console.log(this);
            const data = this.response;
            document.title = data.fields.name.stringValue + " " + "ccfolia log getter";

            this.removeEventListener("load", http_request_callback_name);
        }
        function getVisibleImage() {
            const imgs = document.querySelectorAll('.sample-img');
            let visibleImgs = [];

            imgs.forEach(img => {
                const rect = img.getBoundingClientRect();

                // 画面内に表示されているものだけ
                if (rect.bottom > 0 && rect.top < window.innerHeight) {
                    visibleImgs.push({
                        img: img,
                        top: rect.top
                    });
                }
            });

            // 上から順にソート
            visibleImgs.sort((a, b) => a.top - b.top);

            // 2番目を返す（なければnull）
            if (visibleImgs.length >= 2) {
                return visibleImgs[Math.floor(visibleImgs.length / 3)].img;
            }

            return null;
        }
        function updateBackgroundImage() {
            const enabled = document.getElementById('bg_toggle').checked;
            const bg = document.getElementById('bg-preview');

            // OFFなら消す
            if (!enabled) {
                bg.style.backgroundImage = 'none';
                return;
            }

            const img = getVisibleImage();
            if (img) {
                bg.style.backgroundImage = `url(${img.src})`;
            }
        }

        // スクロール・読み込み時に実行
        window.addEventListener('scroll', updateBackgroundImage);
        window.addEventListener('load', updateBackgroundImage);


        $(function () {
            // ボタン：ログを取得
            $('#get_log').click(function (e) {
                $("#progress").text('取得中...');
                current_room_id = $('#room_id').val();
                document.title = current_room_id + " " + "ccfolia log getter";
                message_json.splice(0);

                name_request.open('GET', get_name_url(current_room_id), true);
                name_request.responseType = 'json';
                name_request.send();
                name_request.addEventListener("load", http_request_callback_name);


                request.open('GET', get_url(current_room_id), true);
                request.responseType = 'json';
                request.send();
                request.addEventListener("load", http_request_callback);
            });

            // ボタン：保存(HTML)
            $('#save_html').click(function (e) {
                var header = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>チャットログ</title></head><body>' + RET;
                var main = convertToHTML($(get_tab_dom_id(get_current_tab())));
                var footer = RET + '</body></html>';
                var doc = header + main + footer;
                // LF => CRLF
                doc = doc.split(/\r?\n/);
                doc = doc.join(CRLF);
                var blob = new Blob([doc], {
                    "type": "text/html"
                });
                $("<a></a>", {
                    href: window.URL.createObjectURL(blob),
                    download: "log_" + current_room_id + "_" + tab_list[get_current_tab()] + ".html",
                    target: "_blank"
                })[0].click();
            });

            // ボタン：保存(JSON)
            $('#save_json').click(function (e) {
                var doc = JSON.stringify(message_json, null, "    ");
                var blob = new Blob([doc], {
                    "type": "text/json"
                });
                $("<a></a>", {
                    href: window.URL.createObjectURL(blob),
                    download: "log_" + current_room_id + ".json",
                    target: "_blank"
                })[0].click();
            });
        });

    </script>
</head>


<body>
    <header>
        <input type="text" id="room_id" placeholder="ルームIDを入力">
        <input type="text" id="text_count" value="0" placeholder="どこから読むか">
        <input type="text" id="id_len" value="3" placeholder="固有IDの長さ">
        <input type="button" id="get_log" value="ログを取得">
        <input type="button" id="save_html" value="保存(HTML)">
        <input type="button" id="save_json" value="保存(JSON)">
        <label>
            <input type="checkbox" id="bg_toggle">
            背景プレビューを有効化
        </label>
        <span id="progress"></span>
        <span id="log_number"></span>
        <form id="html_selector" style="height:50px; overflow: auto;"></form>
    </header>
    <div>

    </div>

    <div id="html" style="padding-top: 60px;"></div>
    <br>これはID周りの関係で配布してはいけない
    <br>?room_id=xxxxx
    <div id="bg-preview"></div>
</body>
<script>
    const params = new URLSearchParams(window.location.search);
    $('#room_id').val(params.get('room_id') || '');
    var pre_request = new XMLHttpRequest();
    if (params.get('room_id') != "") {
        pre_request.open('GET', get_name_url(params.get('room_id')), true);
        pre_request.responseType = 'json';
        pre_request.send();
        pre_request.addEventListener("load", http_request_callback_name);
    }
</script>

</html>
